<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nika Keeper — Settings</title>
  <link rel="stylesheet" href="styles/options.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-title">
        <div class="logo">
          <img src="assets/icon1.png" alt="Nika icon" />
        </div>
        <div class="title-block">
          <h1>Nika Keeper</h1>
          <p class="subtitle">Your cat guards your time!</p>
        </div>
      </div>

      <label class="switch" aria-label="Enable Nika Keeper">
        <input type="checkbox" id="isEnabled" />
        <span class="slider"></span>
      </label>
    </header>

    <section class="card">
      <div class="field">
        <label for="limitMinutes">Limit</label>
        <div class="field-input">
          <input
            type="number"
            id="limitMinutes"
            min="1"
            max="480"
            step="1"
          />
          <span class="suffix">min</span>
        </div>
      </div>

      <div class="field">
        <label for="breakMinutes">Break</label>
        <div class="field-input">
          <input
            type="number"
            id="breakMinutes"
            min="1"
            max="60"
            step="1"
          />
          <span class="suffix">min</span>
        </div>
      </div>

      <button id="saveButton" class="primary" type="button">Save</button>

      <!-- <button id="testCatButton" class="secondary" type="button">Test Cat</button> -->

      <div
        id="status"
        class="status"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>
    </section>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
