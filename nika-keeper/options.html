<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Cat Gatekeeper — Settings</title>
  <link rel="stylesheet" href="styles/options.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-title">
        <div class="logo"></div>
        <div>
          <h1>My Cat Gatekeeper</h1>
          <p class="subtitle">Your cat guards your screen time.</p>
        </div>
      </div>

      <label class="switch">
        <input type="checkbox" id="isEnabled" />
        <span class="slider"></span>
      </label>
    </header>

    <section class="card">
      <div class="field">
        <label for="limitMinutes">Limit</label>
        <div class="field-input">
          <input
            type="number"
            id="limitMinutes"
            min="5"
            max="480"
            step="5"
          />
          <span class="suffix">min</span>
        </div>
      </div>

      <div class="field">
        <label for="breakMinutes">Break</label>
        <div class="field-input">
          <input
            type="number"
            id="breakMinutes"
            min="1"
            max="60"
            step="1"
          />
          <span class="suffix">min</span>
        </div>
      </div>

      <button id="saveButton" class="primary">Save</button>
      <div id="status" class="status"></div>
    </section>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
